name: lynsok_cli
description: A command-line interface for Lynsok, providing tools for managing and interacting with the Lynsok ecosystem.
version: 0.1.0
executables:
  lynsok: bin/lynsok.dart
  lynsok_mcp: bin/mcp.dart
  lynsok_server: bin/server.dart
  lynsok_llm: bin/llm.dart
# repository: https://github.com/my_org/my_repo

environment:
  sdk: ^3.10.4

resolution: workspace

# Add regular dependencies here.
dependencies:
  args: ^2.7.0
  cli_util: ^0.4.2
  console: ^4.1.0
  path: ^1.9.1
  archive: ^3.5.1
  synchronized: ^3.0.0
  shelf: ^1.4.2
  shelf_router: ^1.0.4
  http: ^1.6.0
  mcp_dart: ^2.1.0
  lynsok_core: ^0.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
